<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
</head>


<body>
  <div class="top-bar">
  <div>
    <h2>Dashboard</h2>
    <p id="welcomeText"></p>
  </div>

  <button id="logoutBtn">Logout</button>
</div>

  <!-- ADD CAR -->
<div class="form-card">
  <h3>Add Car</h3>

  <input type="text" id="carNumber" placeholder="Car Number">
  <input type="text" id="brand" placeholder="Brand">
  <input type="text" id="model" placeholder="Model">
  <input type="text" id="colour" placeholder="Colour">

  <button id="addCarBtn">Add Car</button>
</div>
<hr>

  <!-- services -->
  <div class="form-card">
  <h3>Create Service</h3>

  <select id="carSelect"></select>
  <textarea id="serviceNotes" placeholder="Service notes"></textarea>

  <button id="createServiceBtn">Create Service</button>
</div>
  

  
  <hr>
  
 <h3>Active Services</h3>
<ul id="activeServiceList"></ul>
<hr>
<h3>Completed / Cancelled Services</h3>
<ul id="serviceHistoryList"></ul>
<hr>
  <!-- service history -->
   <h3>Service History</h3>
   <select id="carHistory"></select><br><br>  
<ul id="historyList"></ul>

<div id="imageModal" class="image-modal">
  <span class="image-close">&times;</span>
  <img class="image-modal-content" id="modalImage">
</div>

<div id="toastContainer" class="toast-container"></div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
