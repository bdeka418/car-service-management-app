<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>service-center dashboard</title>
</head>
<body>
     <div class="top-bar">
  <div>
    <h2>Service Center</h2>
    <p id="welcomeText"></p>
  </div>

  <button id="logoutBtn">Logout</button>
</div>

  <div class="section-card">
  <div class="section-header">Active Services</div>
  <ul id="serviceList"></ul>
</div>

<div class="section-card">
  <div class="section-header">Completed Services</div>
  <ul id="completedServiceList"></ul>
</div>

<div class="section-card">
  <div class="section-header">Cancelled Services</div>
  <ul id="cancelledServiceList"></ul>
</div>

<div id="imageModal" class="image-modal">
  <span class="image-close">&times;</span>
  <img class="image-modal-content" id="modalImage">
</div>

<div id="toastContainer" class="toast-container"></div>


  <script type="module" src="service-dashboard.js"></script>
</body>
</html>
